name: 3d-contrib
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: MUSTAFA892
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: profile-3d-contrib
          create_branch: true
          commit_message: "Update 3D contribution calendar"
