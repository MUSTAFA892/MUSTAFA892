        <text x="340" y="448" fill="#cdd6f4"><tspan fill="#89b4fa">Gear     </tspan> FIVE — Awakened</text>
        <text x="340" y="468" fill="#cdd6f4"><tspan fill="#89b4fa">Status   </tspan> Nika Unleashed</text>
