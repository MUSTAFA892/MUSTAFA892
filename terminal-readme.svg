            <text x="46" y="404" fill="#cdd6f4"> /     ‑          ‑    \</text>
            <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.85;0.9;1" dur="4s" begin="5.9s" repeatCount="indefinite"/>
