      <!-- block 2 : skills -->
      <text x="28" y="222" opacity="0">
        <animate attributeName="opacity" begin="2.9s" dur="0.25s" to="1" fill="freeze"/>
        <tspan fill="#a6e3a1">guest@mustafa</tspan><tspan fill="#585b70">:</tspan><tspan fill="#89b4fa">~</tspan><tspan fill="#585b70">$ </tspan><tspan fill="#cba6f7">ls ./skills --tree</tspan>
      </text>

      <text x="46" y="244" opacity="0" fill="#cdd6f4">
