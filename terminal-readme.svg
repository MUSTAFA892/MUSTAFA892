<svg viewBox="0 0 940 760" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,Monaco,monospace">

  <defs>
    <clipPath id="winclip">
      <rect x="0" y="0" width="940" height="760" rx="18" ry="18"/>
    </clipPath>

    <linearGradient id="hyprBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#f38ba8"/>
      <stop offset="25%" stop-color="#fab387"/>
      <stop offset="50%" stop-color="#a6e3a1"/>
      <stop offset="75%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#cba6f7"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-940 0; 0 0; 940 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#cba6f7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#cba6f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== window body ===== -->
  <g clip-path="url(#winclip)">
    <rect x="0" y="0" width="940" height="760" fill="#1e1e2e"/>
    <rect x="0" y="0" width="940" height="760" fill="url(#glow)"/>

    <!-- hyprland-style animated gradient active border -->
    <rect x="0" y="0" width="940" height="4" fill="url(#hyprBorder)"/>

    <!-- title bar -->
    <rect x="0" y="4" width="940" height="38" fill="#181825"/>
    <line x1="0" y1="42" x2="940" y2="42" stroke="#313244" stroke-width="1"/>

    <circle cx="28" cy="23" r="6.5" fill="#f38ba8"/>
    <circle cx="50" cy="23" r="6.5" fill="#f9e2af"/>
    <circle cx="72" cy="23" r="6.5" fill="#a6e3a1"/>

    <text x="470" y="27" text-anchor="middle" font-size="13" fill="#a6adc8">mustafa@hyprland: ~  —  kitty</text>
    <text x="908" y="27" text-anchor="end" font-size="12" fill="#585b70">100% ● zsh</text>

    <!-- ================= CONTENT ================= -->
    <g font-size="14" xml:space="preserve">

      <!-- block 1 : whoami -->
      <text x="28" y="78" opacity="0">
        <animate attributeName="opacity" begin="0.4s" dur="0.25s" to="1" fill="freeze"/>
        <tspan fill="#a6e3a1">guest@mustafa</tspan><tspan fill="#585b70">:</tspan><tspan fill="#89b4fa">~</tspan><tspan fill="#585b70">$ </tspan><tspan fill="#cba6f7">neofetch --whoami</tspan>
      </text>

      <text x="46" y="100" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="1.0s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#fab387">Name        </tspan> Mustafa A.
      </text>
      <text x="46" y="122" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="1.3s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#fab387">Role        </tspan> AI/ML Developer | Full-Stack Engineer (MERN)
      </text>
      <text x="46" y="144" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="1.6s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#fab387">Education   </tspan> AI Undergrad @ KGiSL Institute of Technology (2023–2027)
      </text>
      <text x="46" y="166" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="1.9s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#fab387">Company     </tspan> Developer @ NovaCorp
      </text>
      <text x="46" y="188" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="2.2s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#fab387">Focus       </tspan> MERN · Flask APIs · AI Integration · Cloud Deploy
