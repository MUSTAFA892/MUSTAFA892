          <text x="46" y="422" fill="#cdd6f4">|         \___/         |</text>
          <text x="46" y="440" fill="#cdd6f4"> \                    /</text>
          <text x="46" y="458">  '--,,________,,--'</text>

          <text x="46" y="480" fill="#f38ba8" font-weight="bold">
            <animate attributeName="fill" values="#f38ba8;#fab387;#cba6f7;#f38ba8" dur="3s" begin="5.9s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="translate" values="0 0;0 -1.5;0 0" dur="1.6s" begin="5.9s" repeatCount="indefinite"/>
            &#160;&#160;&#160;&#160;&#160;[ GEAR 5 ]
