        <animate attributeName="opacity" begin="7.5s" dur="0.25s" to="1" fill="freeze"/>
        <tspan fill="#a6e3a1">guest@mustafa</tspan><tspan fill="#585b70">:</tspan><tspan fill="#89b4fa">~</tspan><tspan fill="#585b70">$ </tspan><tspan fill="#cba6f7">cat contact.txt</tspan>
