        <tspan fill="#89b4fa">Languages/Frameworks </tspan> Python · JavaScript · Node.js · React · Express · Django
      </text>
      <text x="46" y="266" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="3.8s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#89b4fa">AI / ML              </tspan> TensorFlow · Scikit-learn · OpenCV · Pandas · NumPy
      </text>
      <text x="46" y="288" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="4.1s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#89b4fa">Databases            </tspan> MongoDB · MySQL · PostgreSQL
      </text>
      <text x="46" y="310" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="4.4s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#89b4fa">Cloud / DevOps       </tspan> Firebase · GCP · Docker · Git
      </text>

      <!-- block 3 : luffy neofetch -->
      <text x="28" y="344" opacity="0">
        <animate attributeName="opacity" begin="5.1s" dur="0.25s" to="1" fill="freeze"/>
        <tspan fill="#a6e3a1">guest@mustafa</tspan><tspan fill="#585b70">:</tspan><tspan fill="#89b4fa">~</tspan><tspan fill="#585b70">$ </tspan><tspan fill="#cba6f7">neofetch --luffy</tspan>
      </text>

      <g opacity="0">
        <animate attributeName="opacity" begin="5.6s" dur="0.3s" to="1" fill="freeze"/>

        <!-- ascii art (monospace, small) -->
        <g font-size="13.5" fill="#f9e2af">
          <text x="46"  y="368">    __,,--~~~~--,,__</text>
          <text x="46"  y="386">  ,-'              '-,</text>
          <!-- eyes: open state -->
          <g>
            <text x="46" y="404" fill="#cdd6f4"> /     o          o    \</text>
            <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.85;0.9;1" dur="4s" begin="5.9s" repeatCount="indefinite"/>
          </g>
          <!-- eyes: closed state (blink) -->
