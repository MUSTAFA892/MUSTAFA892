      </text>
      <text x="46" y="586" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="8.6s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#a6e3a1">Portfolio  </tspan><tspan fill="#585b70"> -&gt; </tspan>port-folio-nine-ruddy.vercel.app
      </text>
      <text x="46" y="608" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="8.9s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#a6e3a1">Discord    </tspan><tspan fill="#585b70"> -&gt; </tspan>mustafa5253
      </text>
      <text x="46" y="630" opacity="0" fill="#cdd6f4">
        <animate attributeName="opacity" begin="9.2s" dur="0.2s" to="1" fill="freeze"/>
        <tspan fill="#a6e3a1">Instagram  </tspan><tspan fill="#585b70"> -&gt; </tspan>_.mustafa._52
      </text>

      <!-- final prompt + blinking cursor -->
      <text x="28" y="664" opacity="0">
        <animate attributeName="opacity" begin="9.9s" dur="0.25s" to="1" fill="freeze"/>
        <tspan fill="#a6e3a1">guest@mustafa</tspan><tspan fill="#585b70">:</tspan><tspan fill="#89b4fa">~</tspan><tspan fill="#585b70">$ </tspan>
      </text>

      <rect x="118" y="652" width="9" height="16" fill="#cdd6f4" opacity="0">
        <animate attributeName="opacity" begin="10.1s" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite"/>
      </rect>

    </g>
  </g>

  <!-- outer stroke -->
  <rect x="1" y="1" width="938" height="758" rx="18" ry="18" fill="none" stroke="#11111b" stroke-width="2"/>
</svg>
